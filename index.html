<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Tracker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230e1018'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%231f2230' stroke-width='3'/%3E%3Cpath d='M16 7 A9 9 0 1 1 7 16' fill='none' stroke='%234fc4a8' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='7' cy='16' r='2.5' fill='%23f0a04b'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #07080d;
    --bg2:        #0e1018;
    --bg3:        #161822;
    --border:     #1f2230;
    --border2:    #2a2d42;
    --accent:     #e8615a;
    --accent2:    #f0a04b;
    --text:       #d4d6e8;
    --text-dim:   #6b6f8a;
    --text-dimmer:#3a3d52;
    --cd-near:    #e8615a;
    --cd-mid:     #d4860f;
    --cd-far:     #4fc4a8;
    --today:      #3ab8d8;
    --mono:   'DM Mono', monospace;
    --sans:   'Noto Sans JP', sans-serif;
    --display:'Syne', sans-serif;
  }

  [data-theme="light"] {
    --bg:         #dde0ec;
    --bg2:        #eceef8;
    --bg3:        #d4d8ea;
    --border:     #b8bcd4;
    --border2:    #9aa0be;
    --accent:     #c43c36;
    --accent2:    #9e5e08;
    --text:       #0e1020;
    --text-dim:   #3a4060;
    --text-dimmer:#6870a0;
    --cd-near:    #c43c36;
    --cd-mid:     #9e5e08;
    --cd-far:     #1e9070;
    --today:      #1480a8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(80,100,160,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  [data-theme="light"] body::before {
    background: radial-gradient(ellipse at 50% 0%, rgba(60,80,160,0.05) 0%, transparent 60%);
  }

  .shell {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex; flex-direction: column;
    padding: 0 16px;
  }

  /* ── Header ── */
  header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0 9px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }

  .header-left  { display: flex; align-items: baseline; gap: 10px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .header-clock { font-family: var(--mono); text-align: right; padding-left: 6px; border-left: 1px solid var(--border); }

  h1 { font-family: var(--display); font-size: 20px; font-weight: 800; letter-spacing: -0.02em; color: #fff; line-height: 1; }
  [data-theme="light"] h1 { color: var(--text); }
  h1 span { color: var(--accent); }
  .header-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #9098b8; }
  [data-theme="light"] .header-label { color: var(--text-dim); }
  #clock { font-size: 17px; font-weight: 500; color: var(--text); letter-spacing: 0.06em; }
  #clock-date { font-size: 9px; color: #9098b8; letter-spacing: 0.14em; margin-top: 1px; }
  [data-theme="light"] #clock-date { color: var(--text-dim); }

  .btn-io {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 6px; color: var(--text-dim);
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
    cursor: pointer; padding: 0 10px; height: 26px;
    display: flex; align-items: center; gap: 5px;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .btn-io:hover { color: var(--text); }
  .btn-io svg   { flex-shrink: 0; }
  #import-file  { display: none; }

  /* ── Add bar ── */
  .add-bar {
    flex-shrink: 0;
    display: flex; flex-direction: column;
  }

  /* Fields — hidden until opened */
  .add-fields {
    display: none;
    flex-direction: column; gap: 5px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }
  .add-fields.open { display: flex; }
  .add-bar.editing .add-fields { border-bottom-color: rgba(59,184,216,0.35); }

  /* btn-new-entry lives in the header now */
  .btn-new-entry.open  { border-color: var(--accent); color: var(--accent); }

  .add-row { display: flex; gap: 8px; align-items: center; }

  .add-bar input, .add-bar select {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 6px; color: var(--text);
    font-family: var(--sans); font-size: 13px;
    padding: 0 10px; outline: none;
    transition: border-color 0.15s; height: 30px;
  }
  #input-name  { flex: 1.8; min-width: 0; }
  #input-notes { flex: 1.5; min-width: 0; font-size: 12px; }
  #input-link  { flex: 1;   min-width: 0; font-size: 12px; }
  #input-day   { width: 115px; flex-shrink: 0; }
  #input-time  { width: 90px; flex-shrink: 0; }
  .add-bar input::placeholder { color: var(--text-dimmer); }
  .add-bar input:focus,
  .add-bar select:focus       { box-shadow: 0 0 0 2px rgba(120,135,190,0.22); }
  .add-bar select option      { background: var(--bg3); }

  .btn-add {
    background: var(--bg3); border: 1px solid var(--today);
    border-radius: 6px; color: var(--today); cursor: pointer;
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.08em; padding: 0 14px; height: 26px; flex-shrink: 0;
    display: flex; align-items: center;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { background: var(--today); color: #fff; }

  .edit-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--today);
    display: none; white-space: nowrap;
  }
  .edit-label.visible { display: block; }

  /* ── Schedule ── */
  #schedule {
    flex: 1; min-height: 0;
    display: flex; flex-direction: row;
    padding: 10px 0 6px;
    overflow: hidden;
  }

  .empty-state {
    font-family: var(--mono); font-size: 12px;
    color: var(--text-dimmer); padding: 20px 0;
    align-self: flex-start;
  }

  /* ── Day column ── */
  .day-col {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    padding: 0 10px;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .day-col:first-child { padding-left: 0; }
  .day-col:last-child  { border-right: none; padding-right: 0; }

  /* Today column — cyan-teal (same family as colour tag teal, distinct hue) */
  .day-col.today-col {
    background: rgba(58, 184, 216, 0.04);
    border-radius: 8px;
    margin: -6px -2px;
    padding: 6px 12px;
    border-right: none;
    position: relative;
  }
  .day-col.today-col::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 8px;
    border: 1px solid rgba(58, 184, 216, 0.22);
    pointer-events: none;
  }

  /* ── Day header ── */
  .day-header {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 7px; flex-shrink: 0;
  }
  .day-name {
    font-family: var(--display); font-size: 9.5px;
    letter-spacing: 0.2em; text-transform: uppercase;
    font-weight: 700; color: #9098b8; white-space: nowrap;
  }
  [data-theme="light"] .day-name { color: var(--text-dim); }
  .today-col .day-name { color: var(--today); font-size: 10px; }
  .today-badge {
    font-family: var(--mono); font-size: 8px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--today);
    background: rgba(58,184,216,0.1); border: 1px solid rgba(58,184,216,0.25);
    border-radius: 3px; padding: 1px 5px; white-space: nowrap;
  }
  .day-line  { flex: 1; height: 1px; background: var(--border2); }
  .today-col .day-line { background: rgba(58,184,216,0.3); }
  .day-count { font-family: var(--mono); font-size: 9px; color: var(--text-dimmer); flex-shrink: 0; }

  /* ── Entries ── */
  .entries-list { display: flex; flex-direction: column; gap: 4px; overflow: hidden; flex: 1; }

  /* ── Entry card ── */
  .entry {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 10px 6px;
    display: flex; flex-direction: column; gap: 2px;
    cursor: context-menu;
    position: relative; overflow: hidden;
  }

  .today-col .entry  { border-color: rgba(58, 184, 216, 0.12); }
  .entry:hover       { border-color: var(--border2); }

  /* Colour tag — left accent bar driven by --ec CSS var set inline */
  .entry[data-ec]::after {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--ec);
    border-radius: 7px 0 0 7px;
  }
  .entry[data-ec] {
    border-color: color-mix(in srgb, var(--ec) 30%, var(--border));
    background: color-mix(in srgb, var(--ec) 6%, var(--bg2));
  }

  /* Next-up badge — uses ::before since ::after is the colour-tag bar */
  .entry.next-up::before {
    content: '▶ next';
    position: absolute; top: 5px; right: 8px;
    font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent2);
    background: rgba(240,160,75,0.1); border: 1px solid rgba(240,160,75,0.22);
    border-radius: 3px; padding: 1px 5px;
    pointer-events: none;
  }

  /* Editing indicator ring */
  .entry.editing-target {
    border-color: rgba(58,184,216,0.45) !important;
    box-shadow: 0 0 0 2px rgba(58,184,216,0.1);
  }

  /* Row 1: name */
  .entry-name {
    font-size: 13px; color: var(--text);
    line-height: 1.3; word-break: break-word;
    padding-left: 6px;
  }

  /* Row 2: notes (optional) */
  .entry-notes {
    font-size: 10.5px; color: var(--text-dim);
    font-style: italic; line-height: 1.3;
    padding-left: 6px; word-break: break-word;
  }

  /* Row 3: meta */
  .entry-meta {
    display: flex; justify-content: space-between; align-items: center;
    padding-left: 6px;
    margin-top: 1px;
  }

  .entry-time, .entry-countdown {
    font-family: var(--mono); font-size: 11px; font-weight: 400; letter-spacing: 0.04em;
  }
  .entry-time { color: var(--accent2); }

  .cd-near { color: var(--cd-near); }
  .cd-mid  { color: var(--cd-mid);  }
  .cd-far  { color: var(--cd-far);  }

  /* Link button — only shown when entry has a URL */
  .entry-link-btn {
    display: flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text-dimmer);
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .entry-link-btn:hover {
    border-color: var(--today);
    color: var(--today);
    background: rgba(58,184,216,0.08);
  }
  .entry-meta-right {
    display: flex; align-items: center; gap: 7px;
  }

  /* ── Context menu ── */
  #ctx-menu {
    position: fixed; z-index: 9999;
    background: var(--bg3);
    border: 1px solid var(--border2); border-radius: 8px;
    padding: 4px; min-width: 175px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.3);
    display: none;
  }
  #ctx-menu.visible { display: block; animation: ctxFadeIn 0.1s ease; }

  @keyframes ctxFadeIn {
    from { opacity: 0; transform: scale(0.96) translateY(-4px); }
    to   { opacity: 1; transform: scale(1)    translateY(0);    }
  }

  .ctx-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 12px; border-radius: 5px;
    cursor: pointer; font-size: 13px; color: var(--text);
    font-family: var(--sans); transition: background 0.1s;
  }
  .ctx-item:hover        { background: var(--bg2); }
  .ctx-item.danger       { color: var(--cd-near); }
  .ctx-item.danger:hover { background: rgba(196,60,54,0.1); }
  .ctx-divider { height: 1px; background: var(--border); margin: 3px 4px; }

  /* Colour swatches in context menu */
  .ctx-colors {
    display: flex; gap: 8px; align-items: center;
    padding: 8px 12px 6px;
  }
  .ctx-swatch {
    width: 20px; height: 20px; border-radius: 50%;
    cursor: pointer; flex-shrink: 0;
    border: 2.5px solid transparent;
    box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    transition: transform 0.12s;
  }
  .ctx-swatch:hover  { transform: scale(1.18); }
  .ctx-swatch.active { border-color: var(--text); }

  .btn-theme { padding: 0; width: 26px; justify-content: center; }

  /* Smooth theme transition */
  html, body { transition: background-color 0.2s; }
  .shell, .entry, .add-bar, header, .day-col, #ctx-menu { transition: background-color 0.2s, border-color 0.2s, color 0.15s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-3px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .entry { animation: fadeIn 0.14s ease; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="header-left">
      <h1>Weekly<span>.</span>Tracker</h1>
      <span class="header-label">countdowns for anything recurring</span>
    </div>
    <div class="header-right">
      <button class="btn-io btn-new-entry" id="btn-new-entry" onclick="toggleAddForm()">
        <svg id="btn-new-icon" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1v8M1 5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span id="btn-new-label">New Entry</span>
      </button>
      <button class="btn-io" onclick="exportData()">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v6M2.5 4.5l3 3 3-3M1 9h9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Export
      </button>
      <label class="btn-io">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 10V4M2.5 6.5l3-3 3 3M1 2h9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Import
        <input type="file" id="import-file" accept=".json" onchange="importData(this)">
      </label>
      <button class="btn-io btn-theme" id="btn-theme" onclick="toggleTheme()" title="Toggle light/dark mode">
        <svg id="theme-icon" width="13" height="13" viewBox="0 0 13 13" fill="none"></svg>
      </button>
      <div class="header-clock">
        <div id="clock"></div>
        <div id="clock-date"></div>
      </div>
    </div>
  </header>

  <div class="add-bar" id="add-bar">
    <span class="edit-label" id="edit-label">editing</span>
    <div class="add-fields" id="add-fields">
      <div class="add-row">
        <input type="text" id="input-name" placeholder="Name…" autocomplete="off">
        <select id="input-day">
          <option value="1">Monday</option>
          <option value="2">Tuesday</option>
          <option value="3">Wednesday</option>
          <option value="4">Thursday</option>
          <option value="5">Friday</option>
          <option value="6">Saturday</option>
          <option value="0">Sunday</option>
        </select>
        <input type="time" id="input-time" value="16:00">
        <button class="btn-add" id="btn-submit" onclick="submitEntry()">+ Add</button>
      </div>
      <div class="add-row">
        <input type="text" id="input-notes" placeholder="Notes (optional)" autocomplete="off">
        <input type="url"  id="input-link"  placeholder="Link (optional)" autocomplete="off">
      </div>
    </div>
  </div>

  <div id="schedule"></div>
</div>

<!-- Context menu -->
<div id="ctx-menu">
  <div class="ctx-colors">
    <div class="ctx-swatch" id="cs1" style="background:#e05555" onclick="ctxColor('1')"></div>
    <div class="ctx-swatch" id="cs2" style="background:#e89440" onclick="ctxColor('2')"></div>
    <div class="ctx-swatch" id="cs3" style="background:#4db87a" onclick="ctxColor('3')"></div>
    <div class="ctx-swatch" id="cs4" style="background:#4a9ee8" onclick="ctxColor('4')"></div>
    <div class="ctx-swatch" id="cs5" style="background:#9b6bd4" onclick="ctxColor('5')"></div>
  </div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" onclick="ctxEdit()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Edit
  </div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" onclick="ctxRemove()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 3.5h10M5.5 3.5V2.5h3v1M5.5 6v4M8.5 6v4M3 3.5l.7 7.5h6.6l.7-7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Remove
  </div>
</div>

<script>
const DAY_NAMES   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const STORAGE_KEY = 'ep_tracker_v3';
const ENTRY_COLORS = { '1':'#e05555', '2':'#e89440', '3':'#4db87a', '4':'#4a9ee8', '5':'#9b6bd4' };

let entries    = [];
let nextId     = 1;
let ctxId      = null;
let editingId  = null;
let _currentNextId = null;  // entry id currently showing the "next" badge

// ── Cached DOM refs (stable elements queried once) ────────────────────────────
const $ = {
  clock:     document.getElementById('clock'),
  clockDate: document.getElementById('clock-date'),
  newBtn:    document.getElementById('btn-new-entry'),
  newIcon:   document.getElementById('btn-new-icon'),
  newLabel:  document.getElementById('btn-new-label'),
  fields:    document.getElementById('add-fields'),
  addBar:    document.getElementById('add-bar'),
  name:      document.getElementById('input-name'),
  day:       document.getElementById('input-day'),
  time:      document.getElementById('input-time'),
  notes:     document.getElementById('input-notes'),
  link:      document.getElementById('input-link'),
  submit:    document.getElementById('btn-submit'),
  editLabel: document.getElementById('edit-label'),
  schedule:  document.getElementById('schedule'),
  ctxMenu:   document.getElementById('ctx-menu'),
  themeIcon: document.getElementById('theme-icon'),
};

// ── Timezone ──────────────────────────────────────────────────────────────────
// USER_TZ is the browser's own zone, so local getters already reflect it.
// nowInTZ returns a synthetic Date whose UTC fields hold the local wall-clock,
// letting the rest of the code use .getUTC* uniformly.
const USER_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;

function nowInTZ() {
  const d = new Date();
  return new Date(Date.UTC(
    d.getFullYear(), d.getMonth(), d.getDate(),
    d.getHours(), d.getMinutes(), d.getSeconds()
  ));
}

function tzLabel() {
  try {
    return new Intl.DateTimeFormat('en', { timeZone: USER_TZ, timeZoneName:'shortOffset' })
             .formatToParts(new Date()).find(x => x.type === 'timeZoneName')?.value || USER_TZ;
  } catch { return USER_TZ; }
}
const TZ_LABEL = tzLabel();

// ── Entry normalizer — strips legacy fields, fills missing ones ───────────────
function normalizeEntry(e) {
  // Drop entries missing required fields
  if (typeof e.id !== 'number' || typeof e.day !== 'number') return null;
  return {
    id:    e.id,
    day:   e.day,
    time:  typeof e.time === 'string' ? e.time : '00:00',
    name:  typeof e.name === 'string' ? e.name : '',
    notes: typeof e.notes === 'string' ? e.notes : '',
    link:  typeof e.link === 'string'  ? e.link  : '',
    color: (e.color && ENTRY_COLORS[e.color]) ? e.color : null,
  };
}

function normalizeEntries(arr) {
  return arr.map(normalizeEntry).filter(Boolean);
}

// ── Storage ───────────────────────────────────────────────────────────────────
// Guarantees the next id is always greater than every existing entry id,
// even if the stored/imported nextId is missing or corrupted (prevents id collisions)
function safeNextId(stored) {
  const maxId = entries.reduce((m, e) => Math.max(m, e.id), 0);
  return Math.max(Number(stored) || 0, maxId + 1);
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (d) {
      entries = normalizeEntries(d.entries || []);
      nextId  = safeNextId(d.nextId);
      save(); // flush any legacy fields from storage
    }
  } catch {}
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ entries, nextId }));
}

// ── Time helpers ──────────────────────────────────────────────────────────────
function msUntilNext(day, timeStr, now = nowInTZ()) {
  const [h,m] = timeStr.split(':').map(Number);
  let ahead   = (day - now.getUTCDay() + 7) % 7;
  const ch = now.getUTCHours(), cm = now.getUTCMinutes();
  if (ahead === 0 && (ch > h || (ch === h && cm >= m))) ahead = 7;
  const t = new Date(now);
  t.setUTCDate(t.getUTCDate() + ahead);
  t.setUTCHours(h, m, 0, 0);
  return t - now;
}

function fmtCountdown(ms) {
  const m = Math.floor(ms / 60000);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d === 0 && h === 0) return `${m % 60}m`;
  if (d === 0)             return `${h}h ${m % 60}m`;
  return `${d}d ${h % 24}h`;
}

function cdCls(ms) {
  const h = ms / 3600000;
  return h < 6 ? 'cd-near' : h < 48 ? 'cd-mid' : 'cd-far';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Full render ───────────────────────────────────────────────────────────────
function render() {
  const el    = $.schedule;
  const now   = nowInTZ();
  const today = now.getUTCDay();

  // Single pass over entries: group by day, build countdown map, find next-up
  const byDay = {};
  const msMap = {};
  let minMs = Infinity;
  let nextId_up = null;
  for (const e of entries) {
    (byDay[e.day] ||= []).push(e);
    const ms = msUntilNext(e.day, e.time, now);
    msMap[e.id] = ms;
    if (ms < minMs) { minMs = ms; nextId_up = e.id; }
  }
  _currentNextId = nextId_up;  // HTML below bakes next-up in for this id

  const order = [1, 2, 3, 4, 5, 6, 0];  // Mon → Sun, fixed order
  const days  = order.filter(d => byDay[d]);

  if (!days.length) {
    el.innerHTML = '<p class="empty-state">No entries yet — add one above.</p>';
    return;
  }

  let html = '';
  for (const day of days) {
    const isToday = day === today;
    const list    = byDay[day].sort((a,b) => a.time.localeCompare(b.time));

    html += `<div class="day-col${isToday ? ' today-col' : ''}">
      <div class="day-header">
        <span class="day-name">${DAY_NAMES[day]}</span>
        ${isToday ? '<span class="today-badge">today</span>' : ''}
        <div class="day-line"></div>
        <span class="day-count">${list.length}</span>
      </div>
      <div class="entries-list">`;

    for (const e of list) {
      const ms   = msMap[e.id];
      const isNext    = e.id === nextId_up;
      const isEditing = e.id === editingId;
      const classes   = ['entry',
        isNext    ? 'next-up'        : '',
        isEditing ? 'editing-target' : ''
      ].filter(Boolean).join(' ');
      const colorHex  = e.color ? ENTRY_COLORS[e.color] : null;
      const colorAttrs = colorHex
        ? `data-ec="${e.color}" style="--ec:${colorHex}"`
        : '';

      html += `<div class="${classes}" id="e${e.id}" ${colorAttrs} oncontextmenu="openCtx(event,${e.id})">
        <span class="entry-name">${esc(e.name)}</span>
        ${e.notes ? `<span class="entry-notes">${esc(e.notes)}</span>` : ''}
        <div class="entry-meta">
          <span class="entry-time">${esc(e.time)}</span>
          <div class="entry-meta-right">
            <span class="entry-countdown ${cdCls(ms)}" id="cd${e.id}">${fmtCountdown(ms)}</span>
            ${e.link ? `<a href="${esc(e.link)}" target="_blank" rel="noopener noreferrer" class="entry-link-btn" onclick="event.stopPropagation()" oncontextmenu="event.stopPropagation()"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M4.5 2H2a1 1 0 00-1 1v6a1 1 0 001 1h6a1 1 0 001-1V6.5M6.5 1H10m0 0v3.5M10 1L5 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></a>` : ''}
          </div>
        </div>
      </div>`;
    }

    html += `</div></div>`;
  }

  el.innerHTML = html;
}

// ── Countdown patch — no rebuild, no blink ────────────────────────────────────
function refreshCountdowns() {
  const now = nowInTZ();
  let minMs = Infinity, nuId = null;
  for (const e of entries) {
    const ms = msUntilNext(e.day, e.time, now);
    if (ms < minMs) { minMs = ms; nuId = e.id; }
    const cdEl = document.getElementById(`cd${e.id}`);
    if (cdEl) {
      const txt = fmtCountdown(ms);
      const cls = 'entry-countdown ' + cdCls(ms);
      if (cdEl.textContent !== txt) cdEl.textContent = txt;
      if (cdEl.className   !== cls) cdEl.className   = cls;
    }
  }
  // Move the next-up badge only if the winner changed (touches ≤2 elements)
  if (nuId !== _currentNextId) {
    if (_currentNextId !== null)
      document.getElementById(`e${_currentNextId}`)?.classList.remove('next-up');
    if (nuId !== null)
      document.getElementById(`e${nuId}`)?.classList.add('next-up');
    _currentNextId = nuId;
  }
}

// ── Context menu ──────────────────────────────────────────────────────────────
const ctxMenu = $.ctxMenu;

function openCtx(evt, id) {
  evt.preventDefault();
  evt.stopPropagation();
  ctxId = id;

  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  document.querySelectorAll('.ctx-swatch').forEach(s => s.classList.remove('active'));
  if (entry.color) {
    const sw = document.getElementById(`cs${entry.color}`);
    if (sw) sw.classList.add('active');
  }

  // Measure real size, then position
  ctxMenu.style.visibility = 'hidden';
  ctxMenu.classList.add('visible');
  const mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
  ctxMenu.classList.remove('visible');
  ctxMenu.style.visibility = '';

  const x = Math.min(evt.clientX, window.innerWidth  - mw - 6);
  const y = Math.min(evt.clientY, window.innerHeight - mh - 6);
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top  = y + 'px';
  ctxMenu.classList.add('visible');
}

function closeCtx() { ctxMenu.classList.remove('visible'); ctxId = null; }

function ctxColor(key) {
  if (ctxId === null) return;
  const e = entries.find(x => x.id === ctxId);
  if (e) { e.color = (e.color === key) ? null : key; save(); render(); }
  closeCtx();
}

function ctxEdit() {
  if (ctxId === null) return;
  const e = entries.find(x => x.id === ctxId);
  if (!e) { closeCtx(); return; }

  editingId = e.id;
  openAddForm();
  $.name.value  = e.name;
  $.notes.value = e.notes;
  $.link.value  = e.link;
  $.day.value   = e.day;
  $.time.value  = e.time;

  $.submit.textContent = 'Save Changes';
  $.submit.classList.add('saving');
  $.editLabel.classList.add('visible');
  $.addBar.classList.add('editing');

  // Mark the entry being edited without a full rebuild
  document.getElementById(`e${e.id}`)?.classList.add('editing-target');
  $.name.focus();
  closeCtx();
}

function cancelEdit() {
  if (editingId !== null) {
    document.getElementById(`e${editingId}`)?.classList.remove('editing-target');
  }
  editingId = null;
  $.name.value  = '';
  $.notes.value = '';
  $.link.value  = '';
  $.time.value  = '16:00';
  $.day.value   = '1';
  $.submit.textContent = '+ Add';
  $.submit.classList.remove('saving');
  $.editLabel.classList.remove('visible');
  $.addBar.classList.remove('editing');
  closeAddForm();
}

function ctxRemove() {
  if (ctxId === null) return;
  if (editingId === ctxId) cancelEdit();
  entries = entries.filter(x => x.id !== ctxId);
  save(); render();
  closeCtx();
}

document.addEventListener('click',       e => { if (!ctxMenu.contains(e.target)) closeCtx(); });
document.addEventListener('contextmenu', e => { if (!ctxMenu.contains(e.target)) closeCtx(); });
document.addEventListener('keydown',     e => { if (e.key === 'Escape') { closeCtx(); if (editingId) cancelEdit(); } });

// ── Add form toggle ───────────────────────────────────────────────────────────
function openAddForm() {
  $.fields.classList.add('open');
  $.newBtn.classList.add('open');
  $.newLabel.textContent = 'Close';
  $.newIcon.innerHTML = '<path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>';
}
function closeAddForm() {
  $.fields.classList.remove('open');
  $.newBtn.classList.remove('open');
  $.newLabel.textContent = 'New Entry';
  $.newIcon.innerHTML = '<path d="M5 1v8M1 5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>';
}
function toggleAddForm() {
  const isOpen = $.fields.classList.contains('open');
  if (isOpen) {
    // If editing, cancel edit first
    if (editingId !== null) cancelEdit();
    else closeAddForm();
  } else {
    openAddForm();
    $.name.focus();
  }
}
function submitEntry() {
  const name  = $.name.value.trim();
  const notes = $.notes.value.trim();
  const rawLink = $.link.value.trim();
  const link  = rawLink && !/^https?:\/\//i.test(rawLink) ? 'https://' + rawLink : rawLink;
  const day   = parseInt($.day.value);
  const time  = $.time.value;
  if (!name) { $.name.focus(); return; }

  if (editingId !== null) {
    const e = entries.find(x => x.id === editingId);
    if (e) { e.name = name; e.notes = notes; e.link = link; e.day = day; e.time = time; }
    cancelEdit();
    save();
    render();
  } else {
    entries.push({ id: nextId++, day, time, name, notes, link, color: null });
    $.name.value  = '';
    $.notes.value = '';
    $.link.value  = '';
    $.name.focus();
    closeAddForm();
    save(); render();
  }
}

$.name.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitEntry();
});
$.notes.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitEntry();
});

// ── Export ────────────────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify({ entries, nextId }, null, 2)], { type: 'application/json' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'weekly-tracker-backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Import ────────────────────────────────────────────────────────────────────
function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const d = JSON.parse(evt.target.result);
      if (!Array.isArray(d.entries)) throw new Error('Invalid format');
      entries = normalizeEntries(d.entries);
      nextId  = safeNextId(d.nextId);
      save(); render();
    } catch {
      alert('Import failed: invalid or corrupted file.');
    }
    input.value = ''; // reset so same file can be re-imported
  };
  reader.readAsText(file);
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function tick() {
  const now = nowInTZ();
  const p   = n => String(n).padStart(2,'0');
  $.clock.textContent =
    `${p(now.getUTCHours())}:${p(now.getUTCMinutes())}:${p(now.getUTCSeconds())}`;
  $.clockDate.textContent =
    `${DAY_NAMES[now.getUTCDay()].toUpperCase()} · ${TZ_LABEL}`;
}

// ── Theme ─────────────────────────────────────────────────────────────────────
const MOON_SVG = '<circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.3"/><path d="M6.5 1.5A5 5 0 0 0 6.5 11.5 5 5 0 0 1 6.5 1.5z" fill="currentColor"/>';
const SUN_SVG  = '<circle cx="6.5" cy="6.5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M6.5 1v1M6.5 11v1M1 6.5H2M11 6.5h1M2.8 2.8l.7.7M9.5 9.5l.7.7M9.5 3.5l-.7.7M3.5 9.5l-.7.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>';

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  $.themeIcon.innerHTML = theme === 'light' ? MOON_SVG : SUN_SVG;
}

function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  localStorage.setItem('wt_theme', next);
  applyTheme(next);
}

// Initialise theme before render to avoid flash
const savedTheme = localStorage.getItem('wt_theme') || 'dark';
applyTheme(savedTheme);

load(); render(); tick();
setInterval(tick, 1000);
setInterval(refreshCountdowns, 30000);
</script>
</body>
